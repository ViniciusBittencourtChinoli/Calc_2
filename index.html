<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Calculadora POO</title>
</head>

<body>

    <label>1º Numero: <input type="number" id="num1"</label></br></br>
    <label>2º Numero: <input type="number" id="num2"</label></br></br>
    
    <div>
        <button onclick="calcular('+')">+ (soma)</button>
        <button onclick="calcular('-')">+ (subtracao)</button>
        <button onclick="calcular('*')">+ (multiplicacao)</button>
        <button onclick="calcular('/')">+ (divisao)</button>
    </div>

    <script src="calculadora.js"></script>
</body>
</html>
